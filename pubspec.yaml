name: libserialport_plus
description: "A Dart wrapper (FFI package) for the libserialport library. This package provides a simple API for communicating over serial ports."
version: 1.0.1
homepage: https://github.com/jakobkordez/libserialport_plus
repository: https://github.com/jakobkordez/libserialport_plus

environment:
  sdk: ^3.10.0

dependencies:
  code_assets: ^1.0.0
  equatable: ^2.0.7
  ffi: ^2.1.3
  hooks: ^2.0.0
  logging: ^1.3.0
  native_toolchain_c: ^0.19.0

dev_dependencies:
  ffigen: ^20.0.0
  flutter_lints: ^6.0.0
  test: ^1.29.0
